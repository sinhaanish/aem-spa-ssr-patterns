---
# AEM Edge Functions — SSR Configuration
# Deployed via: Cloud Manager Config Pipeline
# Branch:       feature/edge-functions-ssr
# Docs:         https://experienceleague.adobe.com/en/docs/experience-manager-cloud-service/
#               content/implementing/developing/edge-functions
#
# Prerequisites:
#   - AEM Edge Functions beta access granted
#   - SSR bundle built: cd ui.frontend && npm run build-edge-only
#   - SSR bundle committed: ui.frontend/dist/edge/ssr-bundle.js
#
# To deploy:
#   1. Run Cloud Manager Config Pipeline (takes ~2 minutes, no AEM downtime)
#   2. Verify: curl -I https://<your-publish-url>/content/mysite/us/en/home.html
#              look for → X-SSR: edge

kind: "EdgeFunction"
version: "1"
metadata:
  # Target environments — remove "dev" or "stage" if you want prod-only first
  envTypes:
    - dev
    - stage
    - prod

data:
  functions:
    - name: "spa-ssr"

      # Path to the edge function handler in this repo (relative to repo root)
      path: "edge-functions/ssr/index.js"

      # URL patterns that trigger the edge function.
      # Only GET requests for SPA HTML pages are intercepted.
      # All other requests pass through to AEM publish unchanged.
      urlPatterns:
        - "/content/mysite/**/*.html"

      # Patterns to exclude — these bypass the edge function entirely
      excludePatterns:
        # AEM editor — authors must get the real AEM response for overlays to work
        - "/content/mysite/**/editor.html"
        # AEM editor frame
        - "/content/mysite/**?wcmmode=edit*"
        - "/content/mysite/**?wcmmode=preview*"
        # Sling Model Exporter / API calls — never intercept JSON
        - "/content/mysite/**.model.json"
        - "/content/mysite/**.infinity.json"
        - "/content/mysite/**._jcr_content**"
        # AEM system paths
        - "/libs/**"
        - "/bin/**"
        - "/system/**"
        - "/crx/**"
